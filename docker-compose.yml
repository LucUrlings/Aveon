services:
  aveon:
    image: ghcr.io/lucurlings/aveon:latest
    container_name: aveon
    restart: unless-stopped
    depends_on:
      aveon-redis:
        condition: service_healthy
    ports:
      - "${AVEON_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      FlightApi__ApiKey: ${FLIGHTAPI_API_KEY}
      Redis__ConnectionString: aveon-redis:6379
      Redis__FlightApiOneWayTtlMinutes: ${REDIS_FLIGHT_API_ONE_WAY_TTL_MINUTES:-30}
      Redis__AirportDataTtlMinutes: ${REDIS_AIRPORT_DATA_TTL_MINUTES:-10080}
    networks:
      - aveon-network

  aveon-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - aveon-redis-data:/data
    networks:
      - aveon-network

volumes:
  aveon-redis-data:

networks:
  aveon-network:
