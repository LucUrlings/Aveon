services:
  app:
    image: ghcr.io/lucurlings/aveon:latest
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "${AVEON_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      FlightApi__ApiKey: ${FLIGHTAPI_API_KEY}
      Redis__ConnectionString: redis:6379
      Redis__FlightApiOneWayTtlMinutes: ${REDIS_FLIGHT_API_ONE_WAY_TTL_MINUTES:-30}
      Redis__AirportDataTtlMinutes: ${REDIS_AIRPORT_DATA_TTL_MINUTES:-10080}
    networks:
      - aveon

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - aveon

volumes:
  redis-data:

networks:
  aveon:
